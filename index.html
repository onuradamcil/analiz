<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONR.dev Analiz Raporu</title>
    <style>
        /* S24 Ultra ve diğer cihazlara uygun, mobil dostu tasarım */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0A192F; /* Uygulamanın arka plan rengiyle aynı */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Sonuçlar üste hizalı kalsın */
            height: 100vh;
        }
        #result-container {
            max-width: 600px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05); /* Glassmorphism etkisi */
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            line-height: 1.6;
        }
        h2 {
            color: #00E676; /* Neon yeşil başlık */
            margin-top: 0;
            border-bottom: 2px solid rgba(0, 230, 118, 0.3);
            padding-bottom: 10px;
        }
        p {
            margin: 0;
            white-space: pre-wrap; /* Gemini'nin satır başlarını koru */
        }
    </style>
</head>
<body>
    <div id="result-container">
        <h2>ONR.dev Analiz Raporu</h2>
        <p id="gemini-cevap">Veri bekleniyor kanka...</p>
    </div>

    <script>
        // --- BU KISIM EKSİK OLAN KISIMDIR ---
        // Sayfa yüklendiğinde URL'deki parametreleri kontrol eden script
        window.onload = function() {
            // 1. URL parametrelerini al
            const urlParams = new URLSearchParams(window.location.search);
            // 2. 'cevap' parametresini oku
            const cevap = urlParams.get('cevap');

            // 3. Eğer veri varsa, HTML içindeki 'p' tag'ine yaz
            if (cevap) {
                document.getElementById('gemini-cevap').innerText = decodeURIComponent(cevap);
            } else {
                document.getElementById('gemini-cevap').innerText = "Hata: Analiz sonucu alınamadı kanka.";
            }
        };
    </script>
    <script>
    window.onload = function() {
        // 1. URL'deki arama parametrelerini tara
        const params = new URLSearchParams(window.location.search);
        // 2. 'cevap' anahtarına karşılık gelen değeri al
        const analizSonucu = params.get('cevap');

        if (analizSonucu) {
            // 3. Ekranda ilgili ID'ye sahip yere yazdır
            // Not: HTML içinde id="gemini-cevap" olan bir elementin olmalı kanka
            document.getElementById('gemini-cevap').innerHTML = decodeURIComponent(analizSonucu);
        }
    };
</script>
</body>
</html>
